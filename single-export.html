<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הפקת זימון בודד</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --grad-1: #6a11cb;
      --grad-2: #2575fc;
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.75);
      --surface: rgba(255, 255, 255, 0.10);
      --surface-hover: rgba(255, 255, 255, 0.18);
      --border: rgba(255, 255, 255, 0.22);
      --accent: #ff7a59;
      --success: #34d399;
    }
    body {
      min-height: 100vh;
      padding: 20px 24px 32px;
      font-family: "Segoe UI", "Rubik", Tahoma, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(140% 90% at 100% 0%, rgba(255, 122, 89, 0.32) 0%, transparent 55%),
        radial-gradient(140% 90% at 0% 100%, rgba(52, 211, 153, 0.28) 0%, transparent 55%),
        linear-gradient(140deg, #6a11cb 0%, #4361ee 50%, #2575fc 100%);
    }
    .header { margin-bottom: 18px; }
    .header h1 { font-size: 22px; font-weight: 700; }
    .header p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
      padding: 14px;
      border-radius: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .toolbar-group { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .toolbar-group span { font-size: 12px; color: var(--text-muted); margin-left: 6px; }
    .btn {
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.12s ease;
    }
    .btn:hover { background: var(--surface-hover); transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn--primary { background: linear-gradient(135deg, #2575fc, #6a11cb); }
    .btn--accent { background: linear-gradient(135deg, #ff7a59, #ff4d8d); }
    .btn--success { background: linear-gradient(135deg, #34d399, #059669); }
    .btn--sm { padding: 5px 10px; font-size: 12px; }
    .upload-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.12);
      border: 1px solid var(--border);
    }
    .upload-item label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .upload-item input[type="file"] { font-size: 12px; color: var(--text); }
    .table-wrap {
      overflow: auto;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.06);
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      text-align: right;
      vertical-align: middle;
      white-space: nowrap;
    }
    th { background: rgba(0, 0, 0, 0.2); font-weight: 700; position: sticky; top: 0; }
    tr:hover td { background: rgba(255, 255, 255, 0.05); }
    .actions { display: flex; flex-wrap: wrap; gap: 6px; min-width: 280px; }
    #status {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
    }
    #status.visible { display: block; }
    #status.ok { background: rgba(52, 211, 153, 0.2); border: 1px solid rgba(52, 211, 153, 0.45); }
    #status.error { background: rgba(244, 63, 94, 0.22); border: 1px solid rgba(244, 63, 94, 0.45); }
    #status.info { background: rgba(59, 130, 246, 0.22); border: 1px solid rgba(59, 130, 246, 0.45); }
    .empty { padding: 40px; text-align: center; color: var(--text-muted); }
    .mapping-panel {
      margin-bottom: 14px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.12);
      border: 1px solid var(--border);
    }
    .mapping-panel h3 { font-size: 14px; margin-bottom: 10px; }
    .mapping-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
    }
    .mapping-field { display: flex; flex-direction: column; gap: 4px; }
    .mapping-field label { font-size: 12px; color: var(--text-muted); }
    .mapping-field select {
      padding: 7px 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
    }
    .mapping-field select option { color: #1a1a1a; }
    .mapping-empty { font-size: 12px; color: var(--text-muted); }
    .admin-only { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>הפקת זימון בודד</h1>
    <p id="summary">טוען נתונים...</p>
  </div>

  <div class="upload-row admin-only" id="uploadRow"></div>

  <div class="admin-only" id="mappingPanels"></div>

  <div class="toolbar" id="toolbar"></div>

  <div class="table-wrap">
    <table id="summonsTable">
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="empty" id="emptyState" hidden>אין נתונים. פתח דף זימונים עם טבלה פעילה ולחץ שוב מהתוסף.</div>
  </div>

  <div id="status"></div>

  <script src="jszip.min.js"></script>
  <script src="js/docx-preview.min.js"></script>
  <script src="js/docx-template-engine.js"></script>
  <script src="js/placeholder-mapper.js"></script>
  <script src="js/template-store.js"></script>
  <script src="js/sharepoint-field-map.js"></script>
  <script src="js/sharepoint-config-store.js"></script>
  <script src="js/sharepoint-lookup-service.js"></script>
  <script src="js/quick-print-config.js"></script>
  <script src="js/quick-print-config-store.js"></script>
  <script src="js/quick-print-service.js"></script>
  <script src="js/summons-export-service.js"></script>
  <script src="single-export.js"></script>
</body>
</html>
