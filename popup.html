<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>זימונים</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body class="popup">
  <div class="header">
    <div class="logo" id="appLogo" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3.5" y="5" width="17" height="15" rx="3" fill="#fff" opacity="0.95"/>
        <rect x="3.5" y="5" width="17" height="4.5" rx="3" fill="#ff7a59"/>
        <rect x="7" y="3" width="2" height="4" rx="1" fill="#fff"/>
        <rect x="15" y="3" width="2" height="4" rx="1" fill="#fff"/>
        <circle cx="17.5" cy="16.5" r="3.2" fill="#34d399"/>
        <path d="M16.1 16.6l1.1 1.1 2-2" stroke="#fff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="titles">
      <span class="title">מרכז זימונים</span>
      <span class="subtitle">פעולות מהירות</span>
    </div>
  </div>

  <div class="stack">
    <button type="button" id="printHubBtn" class="btn btn--primary">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M7 8V4h10v4" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="4" y="8" width="16" height="8" rx="2" stroke="#fff" stroke-width="2"/>
          <path d="M7 14h10v6H7z" stroke="#fff" stroke-width="2" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="label">
        <span class="main">הדפסות מרוכזות</span>
        <span class="sub">זימונים וישיבות בית דין במקום אחד</span>
      </span>
    </button>

    <button type="button" id="openSummonsPageBtn" class="btn btn--primary">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 6h12M4 12h12M4 18h8" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M17 14l4 4-4 4" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="label">
        <span class="main">פתח דף זימונים</span>
        <span class="sub">מעבר ויצירה מרובה</span>
      </span>
    </button>

    <button type="button" id="itemPrintBtn" class="btn btn--primary">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 12h6M12 9v6" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          <rect x="4" y="3" width="16" height="18" rx="2" stroke="#fff" stroke-width="2"/>
          <path d="M8 7h8" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="label">
        <span class="main">הדפסת פריט בודד</span>
        <span class="sub">בחר פריט והדפס כל תבנית</span>
      </span>
    </button>

    <button type="button" id="spLookupBtn" class="btn">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="11" r="6" stroke="#fff" stroke-width="2"/>
          <path d="M20 20l-3.5-3.5" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="label">
        <span class="main">חיפוש פריט ברשימה</span>
        <span class="sub">שליפת פרטים לפי מזהה</span>
      </span>
    </button>

    <button type="button" id="downloadBtn" class="btn btn--success">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 4v11" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/>
          <path d="M7 11l5 5 5-5" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M5 20h14" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="label">
        <span class="main">הורד דוח Word</span>
        <span class="sub">ייצוא הטבלה הפעילה</span>
      </span>
    </button>

    <button type="button" id="createSummonsBtn" class="btn btn--accent">
      <span class="icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 5v14M5 12h14" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="label">
        <span class="main">צור מזומנים</span>
        <span class="sub">שליחת הטופס הנוכחי</span>
      </span>
    </button>
  </div>

  <div class="admin-gate" id="adminGate" hidden>
    <input type="password" id="adminPass" placeholder="סיסמת ניהול" />
    <button type="button" id="adminEnter">כניסה</button>
  </div>

  <p id="status"></p>
  <div class="footer">
    <span>RABAZ • זימונים מהירים</span>
    <button type="button" id="openAdminBtn" class="settings-link" title="הגדרות">
      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
        <path d="M19 12a7 7 0 00-.1-1.1l2-1.6-2-3.4-2.4 1a7 7 0 00-1.9-1.1L16.2 2h-4l-.4 2.7a7 7 0 00-1.9 1.1l-2.4-1-2 3.4 2 1.6A7 7 0 005 12c0 .4 0 .7.1 1.1l-2 1.6 2 3.4 2.4-1c.6.5 1.2.8 1.9 1.1l.4 2.7h4l.4-2.7c.7-.3 1.3-.6 1.9-1.1l2.4 1 2-3.4-2-1.6c.1-.4.1-.7.1-1.1z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
      </svg>
      הגדרות
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
